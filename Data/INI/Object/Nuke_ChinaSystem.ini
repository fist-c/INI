;---------------------------------------------------------------------
; Infantry death from radiation
;---------------------------------------------------------------------
Object RadiationInfantry
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01

    DefaultConditionState
      Model = CITOXDTH_SKND
      Animation = CITOXDTH_SKL.CITOXDTH_DTA
      AnimationSpeedFactorRange = 0.9 1.3
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  Side = Civilian
  EditorSorting = SYSTEM
  TransportSlotCount = 1

  ArmorSet
    Conditions      = None
    Armor           = DeadGuyArmor
    DamageFX        = None
  End

  VisionRange = 150
  DisplayName = OBJECT:ToxicInfantry

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = CAN_CAST_REFLECTIONS INFANTRY

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1.0
    InitialHealth   = 1.0
  End

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 5.0
  End

  Behavior = LifetimeUpdate ModuleTag_05
    MinLifetime = 8000
    MaxLifetime = 8000
  End

  Behavior = SlowDeathBehavior ModuleTag_06
    SinkDelay = 1
    SinkRate = 0.1
    DestructionDelay = 10000
  End

  Behavior = SquishCollide ModuleTag_07
  End

  Behavior = FXListDie ModuleTag_08
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_GIDie
  End
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_GIDieCrushed
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 3.0
  GeometryMinorRadius = 3.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
End

;------------------------------------------------------
Object NeutronMissileBallOfDeathHuge

  KindOf = IMMOBILE NO_COLLIDE UNATTACKABLE
  EditorSorting = SYSTEM
  Draw                = W3DModelDraw ModuleTag_01
    ParticlesAttachedToAnimatedBones = Yes
    ConditionState    = None
      Model           = EXNukeSphere
    End
  End

  ClientUpdate = AnimatedParticleSysBoneClientUpdate ModuleTag_04
  End

  Behavior = EMPUpdate ModuleTag_02
    DisabledDuration    = 1
    EffectRadius        = 0.01
    Lifetime            = 800
    StartFadeTime       = 300
    StartScale          = 0.40
    TargetScaleMin      = 8.00
    TargetScaleMax      = 8.00
    StartColor          = R:255 G:255 B:255
    EndColor            = R:0 G:0 B:0
    DoesNotAffect       = ALLIES ENEMIES NEUTRALS
  End

  Geometry            = SPHERE
  GeometryMajorRadius = 30.0
  GeometryIsSmall     = No
End

