;------------------------------------------------------------------------------
; All radiation fields are here
;------------------------------------------------------------------------------

;------------------------------------------------------------------------------
Object NuclearMissileRadiationField

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = NONE
      ParticleSysBone = NONE RadiationFieldNuke
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = IMMOBILE CLEANUP_HAZARD INERT NO_COLLIDE SCORE
  ArmorSet
    Conditions      = None
    Armor           = HazardousMaterialArmor2
  End

  ; ***AUDIO parameters ***
  SoundAmbient      = RadiationPoolAmbientLoop

  ; *** ENGINEERING Parameters ***
  Body = ActiveBody ModuleTag_02
    MaxHealth        = 200.0
    InitialHealth    = 200.0
  End
  Behavior = FireWeaponUpdate ModuleTag_03
    Weapon = NukeRadiationFieldWeapon
  End

  Behavior = LifetimeUpdate ModuleTag_04
    MinLifetime = 60000
    MaxLifetime = 60000
  End

  ExperienceValue = 1 1 1 1    ;Experience point value at each level

  Behavior = DestroyDie ModuleTag_06
  End

  Behavior = FXListDie ModuleTag_07
    DeathFX = FX_RadiationPoolDie
  End

  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = ALL
    CreationList = OCL_RadiationFieldLarge
  End

  Geometry            = CYLINDER
  GeometryMajorRadius = 100.0
  GeometryHeight      = 1.0
  GeometryIsSmall     = No
End

