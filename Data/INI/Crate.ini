Object 1000DollarCrate
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = PMUNCrate03        ;***Plug model here
      ParticleSysBone = FX1 glitter2  
    End
  End

  ; ***DESIGN parameters ***
