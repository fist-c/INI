    RubbleParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    RubbleParticleSystem2 = Bone:Smoke RandomBone:Yes PSys:SmolderingSmoke
  End

  Geometry = BOX
  GeometryMajorRadius = 9.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 7.5
  GeometryIsSmall = Yes
End

