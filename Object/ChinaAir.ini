    ConditionState        = CONTINUOUS_FIRE_SLOW REALLYDAMAGED USING_WEAPON_B
      Model               = NVHelix_GD
      Animation           = NVHelix_GD.NVHelix_GD
      AnimationMode       = LOOP
      AnimationSpeedFactorRange = 0.1 0.1 ;set this state to animate  s l o w l y
